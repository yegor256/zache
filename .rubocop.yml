---
AllCops:
  Exclude:
    - 'bin/**/*'
    - 'assets/**/*'
    - 'vendor/**/**'
  DisplayCopNames: true
  TargetRubyVersion: 2.5
  NewCops: enable
  SuggestExtensions: false
plugins:
  - rubocop-rake
  - rubocop-minitest
  - rubocop-performance
  - rubocop-elegant
Minitest/EmptyLineBeforeAssertionMethods:
  Enabled: false
Minitest/AssertOperator:
  Enabled: false
Layout/EmptyLineAfterGuardClause:
  Enabled: false
Layout/MultilineMethodCallIndentation:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Minitest/MultipleAssertions:
  Max: 5
Metrics/AbcSize:
  Max: 30
Metrics/MethodLength:
  Max: 30
Metrics/CyclomaticComplexity:
  Max: 20
Metrics/PerceivedComplexity:
  Max: 20
Layout/EndOfLine:
  EnforcedStyle: lf
Metrics/BlockLength:
  Max: 28
Elegant/ClassInModule:
  Exclude:
    - 'lib/zache.rb'
    - '**/test_*.rb'
    - '**/*_test.rb'
Elegant/GoodMethodName:
  AllowedNames:
    - remove_all
    - remove_by
    - test_fetches_multiple_keys_in_many_threads_in_dirty_mode
    - run_concurrent_operations
    - perform_cache_operation
Elegant/NoRedundantVariable:
  Exclude:
    - '**/test_*.rb'
    - '**/*_test.rb'
require: []
